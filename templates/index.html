<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Browser | Shakil</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --chrome-bg: #000000;
            --chrome-toolbar: #1a1a1a;
            --chrome-tab: #2a2a2a;
            --accent: #8ab4f8;
            --text: #ffffff;
            --border: #333333;
            --success: #4caf50;
            --danger: #ff5252;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--chrome-bg); color: var(--text); height: 100vh; overflow: hidden; }
        #intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .logo-container { width: 120px; height: 120px; position: relative; display: flex; align-items: center; justify-content: center; }
        .logo-ring { position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: var(--accent); border-bottom-color: var(--accent); border-radius: 50%; }
        .logo-text { font-size: 60px; color: #fff; font-weight: 900; z-index: 2; }
        #main-app { visibility: hidden; display: flex; flex-direction: column; height: 100vh; }
        .tab-strip { background: #000; padding: 8px 10px 0; display: flex; align-items: flex-end; gap: 5px; }
        .active-tab { background: var(--chrome-toolbar); padding: 10px 25px; border-radius: 12px 12px 0 0; font-size: 13px; display: flex; align-items: center; gap: 10px; width: 220px; border: 1px solid var(--border); border-bottom: none; }
        .chrome-toolbar { background: var(--chrome-toolbar); padding: 8px 14px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        .nav-icons { display: flex; gap: 15px; color: #fff; }
        .nav-icons span { cursor: pointer; opacity: 0.8; transition: 0.2s; font-size: 20px; }
        .nav-icons span:hover { opacity: 1; color: var(--accent); }
        .omnibox { flex: 1; background: #2b2b2b; border-radius: 30px; padding: 6px 18px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; transition: 0.3s; }
        .omnibox:focus-within { background: #000; border-color: var(--accent); }
        #url-input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        .content-area { flex: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="intro-overlay">
        <div class="logo-container"><div class="logo-ring"></div><div class="logo-text">N</div></div>
        <h1 style="margin-top:20px; letter-spacing:10px; font-weight: 200;">NEXT-GEN</h1>
    </div>
    <div id="main-app">
        <div class="tab-strip"><div class="active-tab"><span id="tab-title">Google Search</span></div></div>
        <div class="chrome-toolbar">
            <div class="nav-icons"><span class="material-icons-round" onclick="history.back()">arrow_back</span><span class="material-icons-round" onclick="location.reload()">refresh</span></div>
            <div class="omnibox"><input type="text" id="url-input" placeholder="URL বা সার্চ করুন..." onkeydown="if(event.key==='Enter') loadPage()"></div>
        </div>
        <div class="content-area"><iframe id="browser-engine" src="https://www.google.com/search?igu=1"></iframe></div>
    </div>
    <script>
        gsap.to(".logo-ring", { rotation: 360, duration: 2, repeat: -1, ease: "linear" });
        window.onload = () => {
            setTimeout(() => {
                gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    document.getElementById('main-app').style.visibility = 'visible';
                }});
            }, 3000);
        };

        const frame = document.getElementById('browser-engine');
        const input = document.getElementById('url-input');

        function loadPage() {
            let val = input.value.trim();
            if(!val) return;
            let url = (val.includes('.') && !val.includes(' ')) ? (val.startsWith('http') ? val : 'https://' + val) : 'https://www.google.com/search?q=' + encodeURIComponent(val);
            
            // প্রক্সি সার্ভারের মাধ্যমে লোড করা
            frame.src = "/proxy?url=" + encodeURIComponent(url);
            document.getElementById('tab-title').innerText = val;
        }
    </script>
</body>
</html>
